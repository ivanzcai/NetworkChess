name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Validate & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate -w @network-chess/server

      - name: Run Typecheck
        run: npm run typecheck

      - name: Run Lint
        run: npm run lint

      - name: Run Tests
        run: npm run test

      - name: Build All Workspaces
        run: npm run build

      # Note: To trigger automated deployment to hosting platforms:
      # - For Railway: Enable Railway's Github integration. Railway automatically waits for all GitHub check runs to pass before deploying by default.
      # - For Render: You can trigger a deployment by calling Render's deploy hook URL using curl.
      # Example deploy step for Render:
      # - name: Trigger Deploy on Render
      #   if: github.ref == 'refs/heads/main' && success()
      #   run: |
      #     curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
