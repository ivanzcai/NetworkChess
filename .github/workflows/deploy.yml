name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Validate & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate -w @network-chess/server

      - name: Build Core & Engine (needed for typecheck)
        run: |
          npm run build -w @network-chess/core
          npm run build -w @network-chess/engine

      - name: Run Typecheck
        run: npm run typecheck

      - name: Run Lint
        run: npm run lint

      - name: Run Tests
        run: npm run test

      - name: Build All Workspaces
        run: npm run build

  deploy:
    name: Deploy to GCP
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Database Migrations
        env:
          DATABASE_URL: "postgresql://postgres:ChessDbPass1599f!@127.0.0.1:5432/chess"
        run: |
          set -eo pipefail
          # -f fail fast on HTTP errors so a missing release writes nothing
          # to the binary instead of an HTML error page; -S surfaces curl
          # errors; -L follows CDN redirects.
          curl -fSL -o cloud-sql-proxy https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.11.0/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy
          # Start the proxy in the bg with a 30s SIGTERM drain delay so any
          # in-flight Prisma writes can finish cleanly when the step ends.
          # Capture its PID so the EXIT trap can SIGTERM it before GH Actions
          # SIGKILLs the whole process group.
          ./cloud-sql-proxy --max-sigterm-delay=30s network-chess-1599f:australia-southeast1:network-chess-db &
          PROXY_PID=$!
          # Use single-quoted trap so $PROXY_PID isn't expanded at trap-set
          # time -- we want it expanded at fire time, when PROXY_PID is set.
          # ${PROXY_PID:-} defaults to empty so an unset var doesn't error.
          # ... wait || true absorbs the proxy's SIGTERM exit code (commonly
          # 143) so the trap returns 0 and set -e doesn't propagate a fake
          # failure when the step otherwise succeeded.
          trap 'kill -TERM "${PROXY_PID:-}" 2>/dev/null; wait "${PROXY_PID:-}" 2>/dev/null || true' EXIT
          # Wait up to 30s for the proxy to bind 127.0.0.1:5432. /dev/tcp is
          # a bash-only feature; ubuntu-latest runners default to bash so
          # this works, but a future sh-shell swap would silently break it.
          for i in $(seq 1 30); do
            if (echo > /dev/tcp/127.0.0.1/5432) 2>/dev/null; then
              echo "cloud-sql-proxy ready after ${i}s"
              break
            fi
            sleep 1
          done
          if ! (echo > /dev/tcp/127.0.0.1/5432) 2>/dev/null; then
            echo "::error::cloud-sql-proxy did not become ready on 127.0.0.1:5432 within 30s"
            exit 1
          fi
          npm run prisma:migrate -w @network-chess/server

      - name: Build & Push via Cloud Build
        run: |
          cat <<EOF > /tmp/cloudbuild.yaml
          steps:
            - name: 'gcr.io/cloud-builders/docker'
              args: ['build', '-t', 'australia-southeast1-docker.pkg.dev/network-chess-1599f/network-chess/server:latest', '.']
          images:
            - 'australia-southeast1-docker.pkg.dev/network-chess-1599f/network-chess/server:latest'
          options:
            logging: CLOUD_LOGGING_ONLY
          EOF
          gcloud builds submit --config=/tmp/cloudbuild.yaml

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: network-chess
          region: australia-southeast1
          image: australia-southeast1-docker.pkg.dev/network-chess-1599f/network-chess/server:latest
          flags: |
            --add-cloudsql-instances=network-chess-1599f:australia-southeast1:network-chess-db
            --set-env-vars=DATABASE_URL=postgresql://postgres:ChessDbPass1599f!@/chess?host=/cloudsql/network-chess-1599f:australia-southeast1:network-chess-db
            --port=3001
            --memory=512Mi
