name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Validate & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate -w @network-chess/server

      - name: Build Core & Engine (needed for typecheck)
        run: |
          npm run build -w @network-chess/core
          npm run build -w @network-chess/engine

      - name: Run Typecheck
        run: npm run typecheck

      - name: Run Lint
        run: npm run lint

      - name: Run Tests
        run: npm run test

      - name: Build All Workspaces
        run: npm run build

  deploy:
    name: Deploy to GCP
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build & Push via Cloud Build
        run: |
          gcloud builds submit --tag australia-southeast1-docker.pkg.dev/network-chess-1599f/network-chess/server:latest

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: network-chess
          region: australia-southeast1
          image: australia-southeast1-docker.pkg.dev/network-chess-1599f/network-chess/server:latest
          flags: |
            --add-cloudsql-instances=network-chess-1599f:australia-southeast1:network-chess-db
            --set-env-vars=DATABASE_URL=postgresql://postgres:ChessDbPass1599f!@localhost/chess?host=/cloudsql/network-chess-1599f:australia-southeast1:network-chess-db
            --port=3001
            --memory=512Mi
